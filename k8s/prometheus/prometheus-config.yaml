apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alert-rules.yml"

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape Schemind Backend /metrics endpoint
      - job_name: 'schemind-backend'
        static_configs:
          - targets: ['schemind-backend-service.schemind.svc.cluster.local:5001']
        metrics_path: '/metrics'

      # Scrape Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Scrape Kubernetes nodes via kubelet
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Scrape pods with prometheus.io/scrape annotation
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

  alert-rules.yml: |
    groups:
      - name: schemind-backend-alerts
        rules:
          - alert: HighErrorRate
            expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High HTTP error rate detected"
              description: "More than 5% of requests are returning 5xx errors for the past 2 minutes."

          - alert: HighResponseLatency
            expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 1
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "High p95 response latency"
              description: "95th percentile response time is above 1 second for the past 3 minutes."

          - alert: HighMemoryUsage
            expr: process_resident_memory_bytes > 512 * 1024 * 1024
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Backend memory usage above 512MB"
              description: "Process RSS memory has exceeded 512MB for 5 minutes."

          - alert: HighEventLoopLag
            expr: nodejs_eventloop_lag_seconds > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Node.js event loop lag is high"
              description: "Event loop lag exceeds 500ms."

          - alert: BackendDown
            expr: up{job="schemind-backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Schemind backend is unreachable"
              description: "Prometheus cannot scrape the backend /metrics endpoint."

          - alert: TooManyActiveConnections
            expr: active_connections > 100
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "High number of active connections"
              description: "Active connections exceed 100 for over 3 minutes."
