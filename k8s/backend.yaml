apiVersion: apps/v1
kind: Deployment
metadata:
  name: schemind-backend
  namespace: schemind
  labels:
    app: schemind-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schemind-backend
  template:
    metadata:
      labels:
        app: schemind-backend
    spec:
      containers:
        - name: schemind-backend
          image: prajitpranavk/schemind-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: schemind-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: schemind-secrets
                  key: JWT_SECRET
            - name: FRONTEND_URL
              value: "http://NODE_IP:30080"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: schemind-backend-service
  namespace: schemind
spec:
  type: NodePort
  selector:
    app: schemind-backend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
      nodePort: 30081
