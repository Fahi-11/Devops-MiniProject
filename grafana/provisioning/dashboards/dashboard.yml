# ─── Grafana Dashboard Auto-Provisioning ─────────────────────────────────────
# Tells Grafana to load all JSON dashboard files from /var/lib/grafana/dashboards

apiVersion: 1

providers:
  - name: "Schemind Dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
