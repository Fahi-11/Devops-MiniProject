global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Schemind Backend — uses Docker Compose service name
  - job_name: 'schemind-backend'
    static_configs:
      - targets: ['backend:5001']
    metrics_path: '/metrics'
