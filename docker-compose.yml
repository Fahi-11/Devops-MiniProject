# ─── Local Development Stack ─────────────────────────────────────────────────
# Run everything locally with: docker compose up --build
# Access:
#   Frontend   → http://localhost:8080
#   Backend    → http://localhost:5001

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: schemind-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ── Backend (Express API) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: schemind-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/schemind
      - JWT_SECRET=local_dev_secret_change_me
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      - mongo

  # ── Frontend (Vite + Nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5001
    container_name: schemind-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
